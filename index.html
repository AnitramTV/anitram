<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#000;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
position:relative;
}

/* LOGO SFONDO */
.bg-logo{
position:fixed;
width:900px;
opacity:0.05;
filter:blur(18px);
z-index:0;
pointer-events:none;
}

/* CONTENUTO */
.container{
position:relative;
z-index:2;
width:420px;
text-align:center;
}

.top-logo{
width:140px;
margin-bottom:20px;
filter:drop-shadow(0 0 30px rgba(218,150,61,.6));
}

h1{
font-size:64px;
font-weight:900;
letter-spacing:6px;
margin-bottom:10px;
}

.subtitle{
color:#DA963D;
font-weight:bold;
letter-spacing:4px;
margin-bottom:35px;
}

.link{
display:flex;
align-items:center;
gap:18px;
height:78px;
padding:0 18px;
margin-bottom:16px;
text-decoration:none;
color:white;

background:rgba(255,255,255,.05);
border:1px solid rgba(218,150,61,.55);
border-radius:25px;

backdrop-filter:blur(10px);

transition:.25s;
}

.link:hover{
transform:translateY(-3px);
box-shadow:0 0 25px rgba(218,150,61,.35);
}

.icon-box{
width:56px;
height:56px;
border-radius:18px;
background:rgba(255,255,255,.08);
display:flex;
justify-content:center;
align-items:center;
}

.icon{
width:36px;
height:36px;
object-fit:contain;
}

.link span{
font-size:20px;
font-weight:700;
}

.info{
margin-top:25px;
padding:22px;
border-radius:25px;
border:1px solid rgba(218,150,61,.45);
background:rgba(255,255,255,.04);
line-height:1.8;
}

.gold{
color:#DA963D;
font-weight:bold;
}

footer{
margin-top:18px;
font-size:12px;
opacity:.6;
}

</style>
</head>

<body>

<img src="logo.png.png" class="bg-logo">

</div>
