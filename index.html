<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anitram</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#000;
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
position:relative;
}

/* LUCE ORO DIETRO */
body::before{
content:"";
position:fixed;
width:700px;
height:700px;
background:#DA963D;
filter:blur(250px);
opacity:0.15;
left:50%;
top:50%;
transform:translate(-50%,-50%);
z-index:0;
}

.container{
position:relative;
z-index:2;
width:420px;
text-align:center;
}

.logo{
width:130px;
margin-bottom:25px;
filter:
drop-shadow(0 0 15px rgba(218,150,61,.7))
drop-shadow(0 0 30px rgba(218,150,61,.3));
}

h1{
font-size:72px;
font-weight:900;
letter-spacing:4px;
margin-bottom:15px;
text-shadow:0 0 15px rgba(255,255,255,.2);
}

.subtitle{
color:#DA963D;
letter-spacing:5px;
font-weight:700;
margin-bottom:35px;
}

.link{
display:flex;
align-items:center;
gap:18px;
width:100%;
padding:14px 18px;
margin-bottom:16px;
border:1px solid rgba(218,150,61,.7);
border-radius:24px;
background:rgba(255,255,255,.03);
backdrop-filter:blur(10px);
text-decoration:none;
color:white;
font-size:22px;
font-weight:700;
transition:.25s;
}

.link:hover{
transform:translateY(-3px);
box-shadow:0 0 20px rgba(218,150,61,.35);
}

.icon{
width:46px;
height:46px;
border-radius:14px;
object-fit:cover;
}

.live-box{
margin-top:25px;
padding:25px;
border-radius:25px;
border:1px solid rgba(218,150,61,.7);
background:rgba(255,255,255,.02);
}

.live-title{
color:#DA963D;
font-weight:900;
font-size:30px;
margin-bottom:12px;
}

.live-box p{
font-size:20px;
line-height:1.6;
}

.highlight{
color:#DA963D;
font-weight:bold;
}

.footer{
margin-top:25px;
opacity:.6;
font-size:14px;
}
</style>
</head>

<body>

<div class="container">

<img src="Logo Anitram.png" class="logo">

<h1>ANITRAM</h1>

<div class="subtitle">
ENTRA PER RIMANERE AGGIORNATO
</div>

<a href="https://discord.gg/TUO-LINK" class="link">
<img src="icons8-nuovo-logo-discord-48.png" class="icon">
<span>Discord</span>
</a>

<a href="https://twitch.tv/TUO-NOME" class="link">
<img src="icons8-twitch-48.png" class="icon">
<span>Twitch</span>
</a>

<a href="https://x.com/TUO-NOME" class="link">
<img src="icons8-twitterx-48.png" class="icon">
<span>X</span>
</a>

<a href="https://tiktok.com/@TkTok_Anitram" class="link">
<img src="icons8-tiktok-48.png" class="icon">
<span>TikTok</span>
</a>

<div class="live-box">
<div class="live-title">LIVE TIKTOK</div>

<p>
ogni sera
</p>

<p>
ID Rocket League:
<span class="highlight">
TkTok_Anitram
</span>
</p>

<p>
Entra nella community e gioca con noi.
</p>
</div>

<div class="footer">
© Anitram
</div>

</div>

</body>
</html>
