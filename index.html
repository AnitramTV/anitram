<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anitram | Links</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial, Helvetica, sans-serif;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at top, #1a1208 0%, #050505 45%, #000 100%);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 28px 18px;
  overflow-x: hidden;
}

/* LOGO GRANDE SFOCATO DIETRO */
.bg-logo {
  position: fixed;
  width: 1200px;
  max-width: 150vw;
  opacity: 0.08;
  filter: blur(22px);
  z-index: 0;
  animation: floatLogo 6s ease-in-out infinite;
}

@keyframes floatLogo {
  0%, 100% {
    transform: translateY(0) scale(1);
  }
  50% {
    transform: translateY(-18px) scale(1.04);
  }
}

/* CONTENUTO */
.card {
  position: relative;
  z-index: 2;
  width: 100%;
  max-width: 430px;
  padding: 20px 24px 28px;
  background: transparent;
  border: none;
  box-shadow: none;
  text-align: center;
}

/* LOGO IN ALTO */
.top-logo {
  width: 110px;
  height: 110px;
  object-fit: contain;
  margin-bottom: 15px;
  filter: drop-shadow(0 0 25px rgba(218,150,61,.5));
  background: transparent;
}

/* TITOLI */
h1 {
  font-size: 42px;
  letter-spacing: 6px;
  font-weight: 900;
}

.subtitle {
  margin-top: 8px;
  margin-bottom: 32px;
  color: #DA963D;
  font-size: 14px;
  font-weight: 900;
  letter-spacing: 3px;
}

/* PULSANTI */
.link {
  height: 74px;
  margin: 15px 0;
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 17px;
  text-decoration: none;
  color: white;
  border-radius: 26px;
  background: linear-gradient(135deg, rgba(255,255,255,0.11), rgba(255,255,255,0.035));
  border: 1px solid rgba(218,150,61,0.58);
  box-shadow: 0 0 20px rgba(218,150,61,0.14);
  font-size: 19px;
  font-weight: 900;
  transition: 0.25s ease;
  backdrop-filter: blur(14px);
}

.link:hover {
  transform: translateY(-4px) scale(1.025);
  background: rgba(218,150,61,0.18);
  box-shadow: 0 0 36px rgba(218,150,61,0.38);
}

.icon-box {
  width: 50px;
  height: 50px;
  border-radius: 17px;
  background: rgba(255,255,255,0.09);
  border: 1px solid rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.icon {
  width: 36px;
  height: 36px;
  object-fit: contain;
}

.link span {
  flex: 1;
  text-align: left;
}

/* INFO */
.info {
  margin-top: 28px;
  padding: 22px;
  border-radius: 26px;
  background: rgba(218,150,61,0.08);
  border: 1px solid rgba(218,150,61,0.38);
  line-height: 1.7;
  font-size: 14px;
  backdrop-filter: blur(14px);
}

.gold {
  color: #DA963D;
  font-weight: 900;
}

footer {
  margin-top: 18px;
  font-size: 12px;
  color: rgba(255,255,255,0.55);
}

/* TELEFONO */
@media (max-width: 480px) {
  body {
    padding: 22px 16px;
  }

  .card {
    padding: 12px 0 20px;
  }

  .top-logo {
    width: 95px;
    height: 95px;
  }

  h1 {
    font-size: 36px;
    letter-spacing: 5px;
  }

  .subtitle {
    font-size: 12px;
    margin-bottom: 28px;
  }

  .link {
    height: 68px;
    font-size: 18px;
    border-radius: 24px;
  }

  .bg-logo {
    width: 780px;
    opacity: 0.09;
  }
}
</style>
</head>

<body>

<img class="bg-logo" src="logo.png" alt="Logo Anitram sfondo">

<main class="card">

  <img class="top-logo" src="logo.png" alt="Logo Anitram">

  <h1>ANITRAM</h1>
  <div class="subtitle">ENTRA PER RIMANERE AGGIORNATO</div>

  <a class="link" href="https://discord.gg/yEGvZ927eE" target="_blank">
    <div class="icon-box">
      <img class="icon" src="icons8-nuovo-logo-discord-48.png" alt="Discord">
    </div>
    <span>Discord</span>
  </a>

  <a class="link" href="https://www.twitch.tv/anitramtv" target="_blank">
    <div class="icon-box">
      <img class="icon" src="icons8-twitch-48.png" alt="Twitch">
    </div>
    <span>Twitch</span>
  </a>

  <a class="link" href="https://x.com/AnitramTV" target="_blank">
    <div class="icon-box">
      <img class="icon" src="icons8-twitterx-48.png" alt="X">
    </div>
    <span>X</span>
  </a>

  <a class="link" href="https://www.tiktok.com/@aniitram20?is_from_webapp=1&sender_device=pc" target="_blank">
    <div class="icon-box">
      <img class="icon" src="icons8-tiktok-48.png" alt="TikTok">
    </div>
    <span>TikTok</span>
  </a>

  <section class="info">
    <p><span class="gold">LIVE TIKTOK</span> ogni sera</p>
    <p>ID Rocket League: <span class="gold">TkTok_Anitram</span></p>
    <p>Entra nella community e gioca con noi.</p>
  </section>

  <footer>© Anitram</footer>

</main>

</body>
</html>
