<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anitram | Links</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,Helvetica,sans-serif}

body{
  min-height:100vh;
  background:#020202;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:28px 18px;
  overflow-x:hidden;
}

.bg-logo{
  position:fixed;
  width:1050px;
  max-width:145vw;
  opacity:.10;
  filter:blur(28px);
  z-index:0;
}

.wrap{
  position:relative;
  z-index:2;
  width:100%;
  max-width:430px;
  text-align:center;
}

.top-logo{
  width:120px;
  height:120px;
  object-fit:contain;
  margin-bottom:18px;
  filter:drop-shadow(0 0 35px rgba(218,150,61,.65));
}

h1{
  font-size:44px;
  letter-spacing:7px;
  font-weight:900;
}

.subtitle{
  margin:10px 0 34px;
  color:#DA963D;
  font-size:13px;
  font-weight:900;
  letter-spacing:4px;
  text-transform:uppercase;
}

.link{
  height:74px;
  margin:15px 0;
  padding:0 20px;
  display:flex;
  align-items:center;
  gap:18px;
  text-decoration:none;
  color:white;
  border-radius:26px;
  background:linear-gradient(135deg,rgba(255,255,255,.13),rgba(255,255,255,.035));
  border:1px solid rgba(218,150,61,.62);
  box-shadow:0 0 25px rgba(218,150,61,.13);
  font-size:19px;
  font-weight:900;
  transition:.25s ease;
  backdrop-filter:blur(16px);
}

.link:hover{
  transform:translateY(-4px) scale(1.025);
  background:rgba(218,150,61,.18);
  box-shadow:0 0 38px rgba(218,150,61,.42);
}

.icon-box{
  width:52px;
  height:52px;
  border-radius:18px;
  background:rgba(255,255,255,.10);
  border:1px solid rgba(255,255,255,.16);
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}

.icon{
  width:36px;
  height:36px;
  object-fit:contain;
}

.link span{
  flex:1;
  text-align:left;
}

.info{
  margin-top:30px;
  padding:22px;
  border-radius:28px;
  background:rgba(255,255,255,.045);
  border:1px solid rgba(218,150,61,.42);
  line-height:1.7;
  font-size:14px;
  backdrop-filter:blur(16px);
}

.gold{color:#DA963D;font-weight:900}

footer{
  margin-top:18px;
  font-size:12px;
  opacity:.55;
}

@media(max-width:480px){
  .top-logo{width:100px;height:100px}
  h1{font-size:37px}
  .link{height:68px;font-size:18px}
  .bg-logo{width:760px}
}
</style>
</head>

<body>

<img class="bg-logo" src="logo.png">

<main class="wrap">

  <img class="top-logo" src="logo.png">

  <h1>ANITRAM</h1>
  <div class="subtitle">ENTRA PER RIMANERE AGGIORNATO.</div>

  <a class="link" href="https://discord.gg/yEGvZ927eE" target="_blank">
    <div class="icon-box"><img class="icon" src="icons8-nuovo-logo-discord-48.png"></div>
    <span>Discord</span>
  </a>

  <a class="link" href="https://www.twitch.tv/anitramtv" target="_blank">
    <div class="icon-box"><img class="icon" src="icons8-twitch-48.png"></div>
    <span>Twitch</span>
  </a>

  <a class="link" href="https://x.com/AnitramTV" target="_blank">
    <div class="icon-box"><img class="icon" src="icons8-twitterx-48.png"></div>
    <span>X</span>
  </a>

  <a class="link" href="https://www.tiktok.com/@aniitram20?is_from_webapp=1&sender_device=pc" target="_blank">
    <div class="icon-box"><img class="icon" src="icons8-tiktok-48.png"></div>
    <span>TikTok</span>
  </a>

  <section class="info">
    <p><span class="gold">LIVE TIKTOK</span> ogni sera</p>
    <p>ID Rocket League: <span class="gold">TkTok_Anitram</span></p>
    <p>Entra nella community e gioca con noi.</p>
  </section>

  <footer>© Anitram</footer>

</main>

</body>
</html>
