<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anitram | Road To Champion</title>
  <style>
    :root {
      --gold: #DA963D;
      --black: #050505;
      --white: #ffffff;
      --card: rgba(255, 255, 255, 0.06);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background: radial-gradient(circle at top, #1a1208 0%, #050505 42%, #000 100%);
      color: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 28px 18px;
    }

    .container {
      width: 100%;
      max-width: 430px;
      text-align: center;
    }

    .logo {
      width: 145px;
      height: 145px;
      object-fit: contain;
      border-radius: 50%;
      margin-bottom: 14px;
      filter: drop-shadow(0 0 18px rgba(218, 150, 61, 0.45));
    }

    h1 {
      font-size: 34px;
      letter-spacing: 3px;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--gold);
      font-weight: bold;
      margin-bottom: 22px;
      letter-spacing: 1px;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 13px;
      margin-bottom: 24px;
    }

    .btn {
      display: block;
      text-decoration: none;
      color: var(--white);
      background: var(--card);
      border: 1.5px solid var(--gold);
      border-radius: 16px;
      padding: 15px 18px;
      font-size: 17px;
      font-weight: bold;
      box-shadow: 0 0 12px rgba(218, 150, 61, 0.18);
      transition: 0.25s ease;
    }

    .btn:hover {
      transform: scale(1.03);
      background: rgba(218, 150, 61, 0.16);
      box-shadow: 0 0 22px rgba(218, 150, 61, 0.42);
    }

    .info {
      border: 1px solid rgba(218, 150, 61, 0.55);
      border-radius: 18px;
      padding: 16px;
      background: rgba(0, 0, 0, 0.35);
      font-size: 15px;
      line-height: 1.6;
    }

    .gold {
      color: var(--gold);
      font-weight: bold;
    }

    footer {
      margin-top: 18px;
      font-size: 12px;
      color: rgba(255, 255, 255, 0.55);
    }
  </style>
</head>
<body>
  <main class="container">
    <img class="logo" src="assets/logo.png" alt="Logo Anitram" />

    <h1>ANITRAM</h1>
    <p class="subtitle">ROAD TO CHAMPION</p>

    <section class="links">
      <a class="btn" href="https://discord.gg/yEGvZ927eE" target="_blank">💬 Entra nel Discord</a>
      <a class="btn" href="https://www.twitch.tv/anitramtv" target="_blank">📺 Seguimi su Twitch</a>
      <a class="btn" href="https://x.com/AnitramTV" target="_blank">𝕏 Seguimi su X</a>
      <a class="btn" href="https://www.tiktok.com/@aniitram20?is_from_webapp=1&sender_device=pc" target="_blank">🎮 Seguimi su TikTok</a>
    </section>

    <section class="info">
      <p><span class="gold">LIVE TIKTOK</span> ogni sera</p>
      <p>ID Rocket League: <span class="gold">TkTok_Anitram</span></p>
      <p>Entra nella community e gioca con noi.</p>
    </section>

    <footer>© Anitram</footer>
  </main>
</body>
</html>
