<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anitram - Road to Champion</title>

<link rel="preload" href="Logo Anitram.png" as="image">

<style>
*{
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  /* Font nativi del telefono: zero download, zero attesa */
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
}

body {
  min-height: 100svh;
  background: radial-gradient(circle at top, #1c1206 0%, #050505 45%, #000 100%);
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 16px;
  overflow-y: auto; /* Evita blocchi se lo schermo è minuscolo */
}

.container {
  width: 100%;
  max-width: 380px;
  text-align: center;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

.logo {
  width: 78px;
  height: auto;
  margin-bottom: 12px;
  /* Ombra alleggerita per non rallentare i processori dei telefoni vecchi */
  filter: drop-shadow(0 0 12px rgba(218,150,61,.4));
}

h1 {
  font-size: 36px;
  letter-spacing: 5px;
  font-weight: 900;
  margin-bottom: 6px;
}

.subtitle {
  color: #DA963D;
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 3px;
  margin-bottom: 20px;
}

.link {
  width: 100%;
  height: 54px;
  margin-bottom: 10px;
  padding: 0 18px;
  display: flex;
  align-items: center;
  gap: 14px;
  text-decoration: none;
  color: white;
  border-radius: 16px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(218,150,61,.5);
  font-size: 17px;
  font-weight: 700;
  /* Dice al telefono di preparare la GPU per un'animazione fluida */
  will-change: transform, background;
  transition: background 0.2s ease, transform 0.15s ease;
}

/* L'effetto hover si attiva SOLO sui computer, evita bug grafici al tocco su mobile */
@media (hover: hover) {
  .link:hover {
    background: rgba(218, 150, 61, 0.15);
    transform: translateY(-2px);
  }
}

.icon {
  width: 32px;
  height: 32px;
  object-fit: contain;
}

.info {
  width: 100%;
  margin-top: 12px;
  padding: 12px;
  border-radius: 16px;
  border: 1px solid rgba(218,150,61,.35);
  background: rgba(255,255,255,.02);
  font-size: 12px;
  line-height: 1.5;
}

.gold {
  color: #DA963D;
  font-weight: 800;
}

footer {
  margin-top: 24px;
  font-size: 11px;
  opacity: .4;
}

/* Compattezza per schermi molto corti */
@media(max-height: 660px){
  .logo { width: 60px; }
  h1 { font-size: 30px; }
  .link { height: 48px; font-size: 15px; }
  .icon { width: 28px; height: 28px; }
}
</style>
</head>

<body>

<main class="container">

  <img src="Logo Anitram.png" class="logo" alt="Logo Anitram" decoding="async">

  <h1>ANITRAM</h1>
  <div class="subtitle">ROAD TO CHAMPION</div>

  <a class="link" href="https://discord.gg/yEGvZ927eE" target="_blank" rel="noopener">
    <img src="icons8-nuovo-logo-discord-48.png" class="icon" alt="" decoding="async" loading="eager">
    <span>Discord</span>
  </a>

  <a class="link" href="https://www.twitch.tv/anitramtv" target="_blank" rel="noopener">
    <img src="icons8-twitch-48.png" class="icon" alt="" decoding="async" loading="eager">
    <span>Twitch</span>
  </a>

  <a class="link" href="https://x.com/AnitramTV" target="_blank" rel="noopener">
    <img src="icons8-twitterx-48.png" class="icon" alt="" decoding="async">
    <span>X</span>
  </a>

  <a class="link" href="https://www.tiktok.com/@aniitram20" target="_blank" rel="noopener">
    <img src="icons8-tiktok-48.png" class="icon" alt="" decoding="async">
    <span>TikTok</span>
  </a>

  <div class="info">
    <p><span class="gold">LIVE TIKTOK</span> ogni sera</p>
    <p>ID Rocket League: <span class="gold">TkTok_Anitram</span></p>
  </div>

</main>

<footer>© Anitram</footer>

</body>
</html>
